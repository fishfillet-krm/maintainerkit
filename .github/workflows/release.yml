name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6.0.8
        with:
          version: 10.34.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Pack npm artifact
        run: |
          mkdir -p release
          npm pack --pack-destination release
      - name: Generate checksum
        working-directory: release
        run: sha256sum maintainerkit-*.tgz > SHA256SUMS
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: release/sbom.cyclonedx.json
          upload-artifact: false
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release/maintainerkit-*.tgz
          release/SHA256SUMS
          release/sbom.cyclonedx.json
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          --verify-tag
