name: Bug report
description: Report a reproducible MaintainerKit problem.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve MaintainerKit. Do not include secrets or private code.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. With repository files ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MaintainerKit version
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node.js 20, pnpm 10
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      render: shell
