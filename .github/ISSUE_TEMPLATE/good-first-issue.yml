name: Good first issue proposal
description: Suggest a small, well-scoped contribution for a new contributor.
title: "[Good first issue]: "
labels: ["good first issue", "needs-triage"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe one small, reviewable improvement.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Likely area
      description: Which command, core module, test, or document is involved?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: |
        - [ ] Focused implementation
        - [ ] Tests or documentation updated
        - [ ] pnpm verify passes
    validations:
      required: true
