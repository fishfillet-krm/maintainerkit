name: Feature request
description: Propose a focused, safety-conscious improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: Describe the behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and approval considerations
      description: Could this write files, call GitHub, or affect protected areas?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
